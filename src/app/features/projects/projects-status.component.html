<div class="status-timeline-layout">
  <div class="status-timeline" role="tablist" aria-label="SDLC timeline">
    <ng-container *ngFor="let phase of phases; let last = last">
      <button
        type="button"
        role="tab"
        class="status-timeline__step"
        [class.status-timeline__step--active]="activePhase === phase"
        [attr.aria-selected]="activePhase === phase"
        [attr.aria-label]="phaseLabels[phase] + ', ' + countForPhase(phase) + ' projects'"
        (click)="selectPhase(phase)"
      >
        <span class="status-timeline__dot" aria-hidden="true"></span>
        <span class="status-timeline__label">{{ phaseLabels[phase] }}</span>
        <span class="status-timeline__count" aria-hidden="true">({{ countForPhase(phase) }})</span>
      </button>
      <span *ngIf="!last" class="status-timeline__connector" aria-hidden="true"></span>
    </ng-container>
  </div>

  <div class="status-panel">
    <div class="status-panel__scroll">
      <ng-container *ngFor="let phaseKey of [activePhase]; track phaseKey">
        <div class="status-panel__inner">
          <project-status-card
            *ngFor="let project of activeEntries"
            [title]="project.title"
            [category]="statusCategory(project)"
            [summary]="project.summary"
            [link]="statusLink(project)"
          />
          <p *ngIf="activeEntries.length === 0" class="status-panel__empty">No projects in this phase yet.</p>
        </div>
      </ng-container>
    </div>
  </div>
</div>

<div class="filter-bar">
  <button type="button" class="filter-button" [ngClass]="{ active: activeFilter === 'all' }" (click)="setFilter('all')">
    All
  </button>
  <button
    *ngFor="let row of portfolioFilters"
    type="button"
    class="filter-button"
    [ngClass]="{ active: activeFilter === row.id }"
    (click)="setFilter(row.id)"
  >
    {{ row.label }}
  </button>
</div>

<div class="mt-6 grid gap-6">
  <a
    *ngFor="let project of displayedProductProjects"
    [routerLink]="projectCardLink(project)"
    class="project-card-link block no-underline text-left transition duration-200 hover:opacity-95"
  >
    <span *ngIf="project.pinned" class="project-card-pin" aria-hidden="true">★</span>
    <app-card [eyebrow]="categoryEyebrow(project)" [title]="project.title" [description]="project.summary ?? ''">
      <div class="mt-6 grid gap-4" [ngClass]="{ 'lg:grid-cols-[0.65fr_0.35fr]': summaryCardPreviewSrc(project) }">
        <ng-container *ngIf="summaryCardPreviewSrc(project) as previewSrc">
          <img
            [src]="previewSrc"
            [alt]="project.title + ' preview'"
            class="h-44 w-full rounded-3xl border border-slate-800 object-cover bg-slate-950/90"
            [class.summaries-preview-img--align-top]="resolveSummaryPreviewImageAlign(project) === 'alignTop'"
            [class.summaries-preview-img--align-middle]="resolveSummaryPreviewImageAlign(project) === 'alignMiddle'"
            loading="lazy"
          />
        </ng-container>
        <div class="space-y-4 text-slate-300">
          <div>
            <p class="text-xs uppercase tracking-[0.28em] text-slate-400">Tech stack</p>
            <p class="mt-2 text-slate-300">{{ techStackLine(project) }}</p>
          </div>
        </div>
      </div>
    </app-card>
  </a>
</div>

<p *ngIf="displayedProductProjects.length === 0" class="mt-10 text-slate-400">No projects match this category.</p>

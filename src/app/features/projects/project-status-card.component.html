<a [routerLink]="link" class="status-card section-card" [attr.aria-label]="'Open project: ' + title">
  <span class="status-card__category">{{ category }}</span>
  <span class="status-card__title">{{ title }}</span>
  @if (summary?.trim()) {
    <p class="status-card__summary">{{ summary }}</p>
  }
</a>

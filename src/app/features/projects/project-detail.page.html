<section class="section-wrapper" *ngIf="project as p">
  <div class="page-container">
    <p class="mb-6">
      <a
        routerLink="/projects"
        class="text-sm font-medium text-brand-400 transition hover:text-brand-300"
      >
        ← Back to Projects
      </a>
    </p>

    <header class="mb-10 max-w-3xl">
      <p class="text-xs uppercase tracking-[0.32em] text-slate-400">{{ categoryEyebrow(p) }}</p>
      <h1 class="mt-3 text-3xl font-semibold text-white sm:text-4xl">{{ p.title }}</h1>
    </header>

    <article class="section-card p-6 sm:p-8 max-w-3xl">
      <div class="space-y-4 text-slate-300 leading-7">
        <p *ngFor="let block of descriptionParagraphs(p)">{{ block }}</p>
      </div>

      <div *ngIf="hasExternalLink(p)" class="mt-10">
        <a
          [href]="p.link"
          target="_blank"
          rel="noopener noreferrer"
          class="inline-flex items-center gap-2 rounded-full bg-brand-500 px-8 py-3.5 text-base font-semibold text-slate-950 shadow-lg shadow-brand-500/25 transition hover:bg-brand-400 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-brand-400"
        >
          Open live site ↗
        </a>
      </div>

      <div *ngIf="p.preGalleryDisabledCta" class="mt-10">
        <button
          type="button"
          disabled
          class="inline-flex cursor-not-allowed items-center gap-2 rounded-full border border-slate-600/70 bg-slate-800/40 px-8 py-3.5 text-base font-semibold text-slate-500 shadow-none"
          aria-disabled="true"
        >
          {{ p.preGalleryDisabledCta }}
        </button>
      </div>

      <div class="mt-10">
        <h2 class="text-xs uppercase tracking-[0.32em] text-slate-400">Gallery</h2>
        <div *ngIf="galleryImages(p).length > 0" class="project-detail-gallery mt-4">
          <button
            type="button"
            *ngFor="let src of galleryImages(p); let i = index; let c = count"
            class="project-detail-gallery__thumb"
            (click)="openLightbox(p, i)"
            [attr.aria-label]="'View image ' + (i + 1) + ' of ' + c + ' larger'"
          >
            <img
              [src]="src"
              [alt]="p.title + ' screenshot'"
              class="project-detail-gallery__img"
              loading="lazy"
            />
          </button>
        </div>
        <div
          *ngIf="galleryImages(p).length === 0"
          class="mt-4 flex h-48 items-center justify-center rounded-3xl border border-slate-800 bg-slate-950/90 text-sm text-slate-500"
        >
          Screenshots coming soon
        </div>
      </div>

      <div *ngIf="postGalleryParagraphs(p).length > 0" class="mt-10 space-y-4 text-slate-300 leading-7">
        <p *ngFor="let block of postGalleryParagraphs(p)">{{ block }}</p>
      </div>

      <div *ngIf="p.futureImprovements" class="mt-10">
        <h2 class="text-xs uppercase tracking-[0.32em] text-slate-400">Future Development</h2>
        <p class="mt-3 text-slate-300 leading-7 whitespace-pre-line">{{ p.futureImprovements }}</p>
      </div>

      <div class="mt-10">
        <h2 class="text-xs uppercase tracking-[0.32em] text-slate-400">Tech stack</h2>
        <p class="mt-3 text-slate-300 leading-7">{{ techStackLine(p) }}</p>
      </div>

      <div *ngIf="p.features" class="mt-10">
        <h2 class="text-xs uppercase tracking-[0.32em] text-slate-400">Features</h2>
        <p class="mt-3 text-slate-300 leading-7 whitespace-pre-line">{{ p.features }}</p>
      </div>

      <div *ngIf="p.challenges" class="mt-10">
        <h2 class="text-xs uppercase tracking-[0.32em] text-slate-400">Challenges</h2>
        <p class="mt-3 text-slate-300 leading-7 whitespace-pre-line">{{ p.challenges }}</p>
      </div>

    </article>
  </div>

  <div
    *ngIf="lightboxOpen"
    class="project-detail-lightbox"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="'Gallery, image ' + (lightboxIndex + 1) + ' of ' + lightboxImageCount()"
  >
    <div
      class="project-detail-lightbox__backdrop"
      aria-hidden="true"
      (click)="closeLightbox()"
    ></div>

    <button
      type="button"
      class="project-detail-lightbox__close"
      (click)="closeLightbox(); $event.stopPropagation()"
      aria-label="Close gallery"
    >
      <span aria-hidden="true">×</span>
    </button>

    <button
      type="button"
      class="project-detail-lightbox__nav project-detail-lightbox__nav--prev"
      (click)="lightboxPrev(); $event.stopPropagation()"
      [disabled]="!lightboxCanPrev()"
      aria-label="Previous image"
    >
      <span aria-hidden="true">‹</span>
    </button>

    <button
      type="button"
      class="project-detail-lightbox__nav project-detail-lightbox__nav--next"
      (click)="lightboxNext(); $event.stopPropagation()"
      [disabled]="!lightboxCanNext()"
      aria-label="Next image"
    >
      <span aria-hidden="true">›</span>
    </button>

    <div class="project-detail-lightbox__inner" (click)="closeLightbox()">
      <img
        class="project-detail-lightbox__img"
        [src]="lightboxActiveSrc()"
        [alt]="p.title + ' gallery image'"
        (click)="$event.stopPropagation()"
      />
    </div>
  </div>
</section>

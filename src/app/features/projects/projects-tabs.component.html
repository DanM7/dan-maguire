<div class="projects-tabs" role="tablist" aria-label="Projects view">
  <button
    type="button"
    role="tab"
    class="projects-tabs__btn"
    [class.projects-tabs__btn--active]="activeTab === 'products'"
    [attr.aria-selected]="activeTab === 'products'"
    (click)="select('products')"
  >
    Products
  </button>
  <button
    type="button"
    role="tab"
    class="projects-tabs__btn"
    [class.projects-tabs__btn--active]="activeTab === 'technology'"
    [attr.aria-selected]="activeTab === 'technology'"
    (click)="select('technology')"
  >
    Technology
  </button>
  <button
    type="button"
    role="tab"
    class="projects-tabs__btn"
    [class.projects-tabs__btn--active]="activeTab === 'ecosystem'"
    [attr.aria-selected]="activeTab === 'ecosystem'"
    (click)="select('ecosystem')"
  >
    Ecosystem
  </button>
  <button
    type="button"
    role="tab"
    class="projects-tabs__btn"
    [class.projects-tabs__btn--active]="activeTab === 'status'"
    [attr.aria-selected]="activeTab === 'status'"
    (click)="select('status')"
  >
    SDLC
  </button>
</div>

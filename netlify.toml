# Angular SPA: deep links and refresh must serve index.html (client routing).
# https://docs.netlify.com/routing/redirects/rewrites-proxies/

[build]
  command = "npm run build"
  publish = "dist/portfolio-principal"

# Legacy insight URLs under /projects/insights/ (bookmarks, external links)
[[redirects]]
  from = "/projects/insights/*"
  to = "/insights/:splat"
  status = 301

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
